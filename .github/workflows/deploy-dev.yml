name: 🚀 Deploy to AWS EC2 (Dev)

on:
  push:
    branches:
      - dev

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Test
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: � Generate Prisma client
        run: npx prisma generate --schema=src/database/prisma/schema.prisma

      - name: �🔍 Run linter
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Run tests
        run: npm run test -- --passWithNoTests
        env:
          NODE_ENV: test

  # ─────────────────────────────────────────────
  # Job 2: Deploy to EC2
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 🚀 Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            'bash /var/www/smarteco-backend/scripts/deploy.sh'

      - name: ✅ Verify deployment
        run: |
          sleep 10
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}/api/v1/health || echo "000")
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Deployment verified! Health check passed (HTTP 200)"
          else
            echo "⚠️ Health check returned HTTP $RESPONSE — app may still be starting"
          fi

      - name: 📋 Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`dev\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Server** | \`${{ secrets.EC2_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **API:** http://${{ secrets.EC2_HOST }}/api/docs" >> $GITHUB_STEP_SUMMARY
