name: 🧪 CI — Lint & Test

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  ci:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Generate Prisma client
        run: npx prisma generate --schema=src/database/prisma/schema.prisma

      - name: 🔍 Run linter
        run: npm run lint

      - name: 🧪 Run tests
        run: npm run test -- --passWithNoTests
        env:
          NODE_ENV: test

      - name: 🏗️ Test build
        run: npm run build
